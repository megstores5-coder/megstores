<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Pressure Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
margin-top:40px;
}

h1{
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
margin-top:20px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.pressure{
font-size:60px;
color:#22c55e;
font-weight:bold;
margin-top:10px;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:#f97316;
color:white;
cursor:pointer;
font-size:16px;
margin-top:10px;
transition:0.3s;
}

button:hover{
background:#ea580c;
}

canvas{
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Pressure Monitoring System</h1>

<div class="card">
<div>Current Pressure</div>
<div class="pressure" id="pressure">0</div>
BAR
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<button onclick="exportPDF()">Export PDF</button>
</div>

</div>

<script>

let pressure = 4.6

const ctx = document.getElementById('chart');

const chart = new Chart(ctx, {
type: 'line',
data: {
labels: [],
datasets: [{
label: 'Pressure (Bar)',
data: [],
borderColor:'#22c55e',
backgroundColor:'rgba(34,197,94,0.2)',
borderWidth:3,
tension:0.3,
fill:true
}]
},
options:{
scales:{
y:{
beginAtZero:false
}
}
}
})

function updateData(){

pressure = pressure + (Math.random()-0.5)

document.getElementById("pressure").innerText = pressure.toFixed(2)

chart.data.labels.push(new Date().toLocaleTimeString())
chart.data.datasets[0].data.push(pressure)

if(chart.data.labels.length>20){
chart.data.labels.shift()
chart.data.datasets[0].data.shift()
}

chart.update()

}

setInterval(updateData,2000)

function exportPDF(){
window.print()
}

</script>

</body>
</html>
