<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>MegStores Pressure Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* إجبار المتصفح على طباعة الألوان والخلفيات */
@media print {
   
    button { display: none !important; } /* إخفاء الأزرار عند الطباعة */
    body { background: white !important; color: black !important; }
    .card { border: 1px solid #ddd !important; box-shadow: none !important; }
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
    padding-bottom: 50px;
}

.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    margin-top: 30px;
}

/* تحسين منطقة اللوجو */
.header-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
}

.logo-img {
    width: 200px; /* تكبير اللوجو قليلاً ليكون أوضح */
    height: auto;
    margin-bottom: 10px;
}

.brand-name {
    font-size: 42px;
    font-weight: 900;
    color: #f97316;
    letter-spacing: 2px;
    margin: 0;
    text-transform: uppercase;
}

.subtitle {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
}

.pressure-label {
    font-size: 18px;
    color: #94a3b8;
}

.pressure {
    font-size: 70px;
    color: #22c55e;
    font-weight: bold;
    margin: 10px 0;
}

.unit {
    font-size: 20px;
    color: #64748b;
}

button {
    padding: 15px 35px;
    border: none;
    border-radius: 10px;
    background: #f97316;
    color: white;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

button:hover {
    background: #ea580c;
    transform: translateY(-2px);
}

canvas {
    max-height: 400px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header-brand">
        <img src="mhs.png" alt="MegStores Logo" class="logo-img">
        <h1 class="brand-name">MEG STORES</h1>
        <div class="subtitle">For engineering testing equipment & devices</div>
    </div>

    <div class="card">
        <div class="pressure-label">الضغط الحالي / Current Pressure</div>
        <div class="pressure" id="pressure">4.60</div>
        <div class="unit">BAR</div>
    </div>

    <div class="card">
        <canvas id="chart"></canvas>
    </div>

    <div class="card">
        <button onclick="exportPDF()">حفظ التقرير (PDF)</button>
    </div>

</div>

<script>
let pressure = 4.6;
const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'الضغط (Bar)',
            data: [],
            borderColor: '#f97316',
            backgroundColor: 'rgba(249, 115, 22, 0.2)',
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointRadius: 0
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { 
                beginAtZero: false,
                grid: { color: '#334155' }
            },
            x: { 
                grid: { display: false }
            }
        },
        plugins: {
            legend: { display: false }
        }
    }
});

function updateData() {
    pressure = pressure + (Math.random() - 0.5);
    if(pressure < 0) pressure = 0; // منع القيم السالبة
    
    document.getElementById("pressure").innerText = pressure.toFixed(2);
    
    // تغيير اللون إذا زاد الضغط عن حد معين (دلع إضافي)
    const pElement = document.getElementById("pressure");
    if(pressure > 6) {
        pElement.style.color = "#ef4444"; // أحمر خطر
    } else {
        pElement.style.color = "#22c55e"; // أخضر طبيعي
    }

    chart.data.labels.push(new Date().toLocaleTimeString());
    chart.data.datasets[0].data.push(pressure);

    if (chart.data.labels.length > 20) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }
    chart.update('none'); // تحديث صامت لتحسين الأداء
}

setInterval(updateData, 2000);

function exportPDF() {
    window.print();
}
</script>

</body>
</html>
