<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | MegStores</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root{
  --primary:#0F172A;
  --accent:#F97316;
  --light:#F8FAFC;
  --text:#334155;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Cairo',sans-serif;
  background:var(--light);
  display:flex;
  min-height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  background:var(--primary);
  color:#fff;
  padding:30px 20px;
}

.sidebar h2{
  margin-bottom:40px;
  font-weight:900;
}

.sidebar ul{
  list-style:none;
}

.sidebar li{
  margin-bottom:20px;
}

.sidebar a{
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.sidebar a:hover{
  color:var(--accent);
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:40px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
}

.topbar h1{
  font-size:26px;
  color:var(--primary);
}

.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:40px;
}

.stat-card{
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.stat-card h3{
  color:var(--text);
  margin-bottom:10px;
  font-size:16px;
}

.stat-card span{
  font-size:22px;
  font-weight:800;
  color:var(--primary);
}

/* ===== TABLE ===== */
.table-container{
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:12px;
  text-align:right;
  border-bottom:1px solid #eee;
}

th{
  background:#f1f5f9;
}

.action-btn{
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
}

.edit{
  background:#0ea5e9;
  color:#fff;
}

.delete{
  background:#ef4444;
  color:#fff;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>MegStores</h2>
  <ul>
    <li><a href="#">لوحة التحكم</a></li>
    <li><a href="#">المنتجات</a></li>
    <li><a href="add-product.html">إضافة منتج</a></li>
    <li><a href="#">الطلبات</a></li>
    <li><a href="#">تسجيل خروج</a></li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h1>لوحة التحكم</h1>
    <span>مرحبًا، Admin</span>
  </div>

  <!-- STATS -->
  <div class="card-grid">
    <div class="stat-card">
      <h3>عدد المنتجات</h3>
      <span id="productCount">0</span>
    </div>
    <div class="stat-card">
      <h3>عدد الطلبات</h3>
      <span>0</span>
    </div>
  </div>

  <!-- PRODUCTS TABLE -->
  <div class="table-container">
    <h3 style="margin-bottom:20px;">قائمة المنتجات</h3>
    <table>
      <thead>
        <tr>
          <th>الصورة</th>
          <th>الاسم</th>
          <th>السعر</th>
          <th>التحكم</th>
      
        </tr>
      </thead>
      <tbody id="productsTable">
        <!-- المنتجات هتيجي هنا -->
      </tbody>
    </table>
  </div>

</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCFdsyGBaoWc5F7djDH7OP6kX0fLWVJ20",
    authDomain: "megstores-faad1.firebaseapp.com",
    projectId: "megstores-faad1",
    storageBucket: "megstores-faad1.firebasestorage.app",
    messagingSenderId: "576608083509",
    appId: "1:576608083509:web:195e58b75446a5caee1b7c",
    measurementId: "G-GSBML886WV"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const table = document.getElementById("productsTable");
  const countEl = document.getElementById("productCount");

  async function loadProducts() {
    table.innerHTML = "";
    const snapshot = await getDocs(collection(db, "products"));

    countEl.textContent = snapshot.size;

    snapshot.forEach((item) => {
      const data = item.data();
 const row = `
<tr>
  <td><img src="${data.image}" width="60" style="border-radius:6px;"></td>
  <td>${data.name}</td>
  <td>${data.price} جنيه</td>
  <td>
    <button class="action-btn delete" data-id="${item.id}">
      حذف
    </button>
  </td>
</tr>
`;
      table.innerHTML += row;
    });

    attachDeleteEvents();
  }

  function attachDeleteEvents() {
    document.querySelectorAll(".delete").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const id = btn.getAttribute("data-id");
        if (confirm("متأكد من حذف المنتج؟")) {
          await deleteDoc(doc(db, "products", id));
          loadProducts();
        }
      });
    });
  }

  loadProducts();
</script>
</body>
</html>
