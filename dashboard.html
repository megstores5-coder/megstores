<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | MegStores</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

:root{
--primary:#0F172A;
--accent:#F97316;
--light:#F8FAFC;
--text:#334155;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:var(--light);
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:var(--primary);
color:#fff;
padding:30px 20px;
}

.sidebar h2{
margin-bottom:40px;
font-weight:900;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin-bottom:20px;
}

.sidebar a{
text-decoration:none;
color:#fff;
transition:.3s;
font-weight:600;
display:block;
padding:6px 0;
}

.sidebar a:hover{
color:var(--accent);
}

.sidebar a.active{
color:var(--accent);
font-weight:800;
}

/* MAIN */

.main{
flex:1;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.topbar h1{
font-size:26px;
color:var(--primary);
}

/* CARDS */

.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.stat-card{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.stat-card h3{
color:var(--text);
margin-bottom:10px;
font-size:16px;
}

.stat-card span{
font-size:28px;
font-weight:800;
color:var(--primary);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>MegStores</h2>

<ul>

<li><a href="dashboard.html" class="active">لوحة التحكم</a></li>
<li><a href="products.html">المنتجات</a></li>
<li><a href="add-product.html">إضافة منتج</a></li>
<li><a href="orders.html">الطلبات</a></li>

<li>
<a href="#" onclick="logout()">تسجيل خروج</a>
</li>

</ul>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>لوحة التحكم</h1>

<span>مرحبًا، مازن </span>

</div>

<!-- STATS -->

<div class="card-grid">

<div class="stat-card">
<h3>عدد المنتجات</h3>
<span id="productCount">0</span>
</div>

<div class="stat-card">
<h3>عدد الطلبات</h3>
<span id="ordersCount">0</span>
</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { 
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyCCFdsyGBaoWc5F7djDH7OP6kX0fLWVJ20",
authDomain: "megstores-faad1.firebaseapp.com",
projectId: "megstores-faad1",
storageBucket: "megstores-faad1.firebasestorage.app",
messagingSenderId: "576608083509",
appId: "1:576608083509:web:195e58b75446a5caee1b7c",
measurementId: "G-GSBML886WV"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


async function loadStats(){

const products = await getDocs(collection(db,"products"));
const orders = await getDocs(collection(db,"orders"));

document.getElementById("productCount").textContent = products.size;
document.getElementById("ordersCount").textContent = orders.size;

}

loadStats();

</script>

<!-- LOGIN PROTECTION -->

<script>

if(sessionStorage.getItem("isLoggedIn") !== "true"){
window.location.href = "login.html";
}

function logout(){
sessionStorage.removeItem("isLoggedIn");
window.location.href = "login.html";
}


async function loadStats(){

const products = await getDocs(collection(db,"products"));
const orders = await getDocs(collection(db,"orders"));

document.getElementById("productCount").textContent = products.size;
document.getElementById("ordersCount").textContent = orders.size;

}

loadStats();

</script>

</body>
</html>
